<!DOCTYPE html>
<html lang="en">
<head>

<title>Voynich MS 408 — Currier Hand Edition (v2)</title>

<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --border: #333;
    --text: #ddd;
    --sub: #888;

  }
  body.light {
    --bg: #fafafa;
    --panel: #fff;
    --border: #ccc;
    --text: #222;
    --sub: #666;
    --accent: #b91c1c;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    transition: background 0.25s, color 0.25s;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    margin: 0;
    font-size: 1.3em;
    font-weight: 600;
    color: var(--accent);
  }
  .subtitle {
    color: var(--sub);
    font-size: 0.85em;
    margin-top: 3px;
  }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 0.85em;
    color: var(--sub);
  }
  .controls select, .controls button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85em;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); }
  .layout {
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 10px;
    padding: 10px;
  }
  .layout-main { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .layout-main .full { grid-column: 1 / -1; }
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
  }
  .full { grid-column: 1 / -1; }
  .sidepanel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    height: 920px;
    display: flex;
    flex-direction: column;
  }
  .sidepanel-header {
    color: var(--accent);
    font-size: 0.85em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .sidepanel-help {
    color: var(--sub);
    font-size: 0.72em;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .sidepanel-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .sidepanel-actions button {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.75em;
    cursor: pointer;
  }
  .sidepanel-actions button:hover { border-color: var(--accent); }
  .sidepanel-list {
    overflow-y: auto;
    flex: 1;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }
  .src-item {
    display: flex;
    align-items: center;
    padding: 4px 6px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.78em;
    color: var(--text);
  }
  .src-item:hover { background: rgba(231,76,60,0.08); }
  .src-item.active { background: rgba(231,76,60,0.18); color: var(--accent); font-weight: 600; }
  .src-item .folio { flex: 1; font-family: 'SF Mono', Menlo, monospace; }
  .src-item .deg { color: var(--sub); font-size: 0.85em; }
  .src-item.active .deg { color: var(--accent); }

    background: var(--panel);

    border-radius: 6px;
    padding: 8px;
  }
